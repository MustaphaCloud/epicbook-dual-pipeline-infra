trigger:
- main

pool:
  name: epicbook-pool

variables:
  serviceConnection: 'epicbook-azure-rm'
  tfVersion: '1.6.6'

stages:
- stage: Terraform_Infra
  displayName: 'Provision EpicBook Infrastructure'
  jobs:
  - job: TerraformJob
    displayName: 'Terraform Init, Plan and Apply'
    steps:

    - checkout: self

    - script: |
        wget -q https://releases.hashicorp.com/terraform/$(tfVersion)/terraform_$(tfVersion)_linux_amd64.zip
        unzip -o terraform_$(tfVersion)_linux_amd64.zip
        sudo mv terraform /usr/local/bin/
        terraform version
      displayName: 'Install Terraform $(tfVersion)'

    - script: |
        terraform init
      displayName: 'Terraform Init'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    - script: |
        terraform plan -out=tfplan
      displayName: 'Terraform Plan'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    - script: |
        terraform apply -auto-approve tfplan
      displayName: 'Terraform Apply'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    - script: |
        echo "===== INFRASTRUCTURE OUTPUTS ====="
        terraform output
        echo "=================================="
      displayName: 'Show Terraform Outputs'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)